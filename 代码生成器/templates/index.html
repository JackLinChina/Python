<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可视化代码生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        .status {
            padding: 12px;
            border-radius: 6px;
            margin-top: 10px;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d1f2e5;
            color: #0f5d3f;
            border-left: 4px solid #10b981;
        }

        .status.error {
            background: #fdd5d5;
            color: #5a1c1c;
            border-left: 4px solid #ef4444;
        }

        .status.loading {
            background: #dbeafe;
            color: #1e40af;
            border-left: 4px solid #3b82f6;
        }

        .tables-section {
            max-height: 400px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px;
            background: #f9f9f9;
        }

        .table-item {
            padding: 12px;
            margin-bottom: 8px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin: 0;
        }

        .table-item:hover {
            background: #f0f7ff;
            border-color: #667eea;
        }

        .table-item.selected {
            background: #e6f2ff;
            border-color: #667eea;
        }

        .table-info {
            flex: 1;
        }

        .table-info h4 {
            color: #333;
            margin-bottom: 2px;
            margin: 0;
        }

        .table-info p {
            color: #999;
            font-size: 0.9rem;
            margin: 0;
        }

        .columns-section {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px;
            background: #f9f9f9;
        }

        .column-item {
            padding: 8px;
            margin-bottom: 6px;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .column-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .column-info {
            flex: 1;
            font-size: 0.9rem;
        }

        .column-name {
            font-weight: 600;
            color: #333;
        }

        .column-type {
            color: #999;
            font-size: 0.85rem;
        }

        .section-header {
            background: #667eea;
            color: white;
            padding: 12px;
            border-radius: 4px 4px 0 0;
            margin: 15px 0 10px 0;
            font-weight: 600;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading-spinner.show {
            display: block;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 10px;
        }

        .step {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: #f0f0f0;
            border-radius: 6px;
            color: #999;
            font-weight: 600;
        }

        .step.active {
            background: #667eea;
            color: white;
        }

        .step.completed {
            background: #10b981;
            color: white;
        }

        .info-text {
            background: #e6f2ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            border-radius: 4px;
            color: #0f40a8;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 可视化代码生成器</h1>
            <p>连接数据库 → 选择表 → 自动生成代码</p>
        </div>

        <div class="step-indicator">
            <div class="step active" id="step1">①连接数据库</div>
            <div class="step" id="step2">②选择表</div>
            <div class="step" id="step3">③生成代码</div>
        </div>

        <div class="main-content">
            <!-- 左侧：数据库连接 -->
            <div class="card">
                <h2>📊 数据库连接</h2>
                <div class="form-group">
                    <label for="dbType">数据库类型</label>
                    <select id="dbType" onchange="updateConnectionFields()">
                        <option value="mysql">MySQL</option>
                        <option value="postgresql">PostgreSQL</option>
                        <option value="sqlserver">SQL Server</option>
                        <option value="oracle">Oracle</option>
                    </select>
                </div>

                <!-- MySQL/PostgreSQL/SQL Server 连接配置 -->
                <div id="standardDbFields">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="host">主机地址</label>
                            <input type="text" id="host" placeholder="例: localhost" value="localhost">
                        </div>
                        <div class="form-group">
                            <label for="port">端口</label>
                            <input type="number" id="port" value="3306">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="user">用户名</label>
                        <input type="text" id="user" placeholder="例: root" value="root">
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" placeholder="密码">
                    </div>
                    <div class="form-group">
                        <label for="database">数据库名</label>
                        <input type="text" id="database" placeholder="例: mydb">
                    </div>
                </div>

                <!-- Oracle 特殊配置 -->
                <div id="oracleFields" style="display: none;">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="oracleHost">主机地址</label>
                            <input type="text" id="oracleHost" placeholder="例: localhost">
                        </div>
                        <div class="form-group">
                            <label for="oraclePort">端口</label>
                            <input type="number" id="oraclePort" value="1521">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="oracleUser">用户名</label>
                        <input type="text" id="oracleUser" placeholder="例: system">
                    </div>
                    <div class="form-group">
                        <label for="oraclePassword">密码</label>
                        <input type="password" id="oraclePassword" placeholder="密码">
                    </div>
                    <div class="form-group">
                        <label for="oracleServiceName">Service Name</label>
                        <input type="text" id="oracleServiceName" placeholder="例: ORCL" value="ORCL">
                    </div>
                </div>

                <div class="form-group">
                    <label for="outputPath">输出目录</label>
                    <input type="text" id="outputPath" placeholder="例: Api" value="Api" readonly style="background: #f0f0f0; cursor: not-allowed;">
                    <p style="color: #999; font-size: 0.9rem; margin-top: 5px;">代码将生成到当前目录下的 Api 文件夹</p>
                </div>

                <button class="btn btn-primary" onclick="testConnection()">🔗 测试连接</button>
                <div id="connectionStatus" class="status"></div>
            </div>

            <!-- 右侧：表选择 -->
            <div class="card">
                <h2>📋 选择表</h2>
                <div class="info-text">
                    勾选要生成代码的表。主键字段会自动排除，其他字段将全部生成。
                </div>
                <div id="loadingTables" class="loading-spinner">
                    <div class="spinner"></div>
                    加载表中...
                </div>
                <div id="tablesList" class="tables-section" style="display: none;"></div>
                <div id="tablesStatus" class="status"></div>
            </div>
        </div>

        <!-- 底部：生成按钮 -->
        <div class="card full-width">
            <h2>⚙️ 生成代码</h2>
            <div style="margin-bottom: 20px; padding: 15px; background: #f9f9f9; border-radius: 6px;">
                <strong>🎯 已选择的表:</strong>
                <div id="selectedTablesSummary" style="margin-top: 10px; color: #666;">未选择任何表</div>
            </div>

            <div class="button-group" style="margin-top: 20px;">
                <button class="btn btn-secondary" onclick="clearSelection()">清除选择</button>
                <button class="btn btn-success" onclick="generateCode()">✨ 生成代码</button>
            </div>
            <div id="generateStatus" class="status"></div>
            <div id="downloadSection" style="display: none; margin-top: 20px; padding: 15px; background: #d1f2e5; border-radius: 6px; border-left: 4px solid #10b981;">
                <div style="color: #0f5d3f; margin-bottom: 10px;">
                    <strong>✓ 代码生成完成！</strong>
                </div>
                <div style="color: #0f5d3f; font-size: 0.9rem; margin-bottom: 15px;">
                    已生成表: <span id="generatedTablesList" style="color: #667eea; font-weight: 600;"></span>
                </div>
                <button id="downloadBtn" class="btn btn-success" style="width: 100%;">
                    ⬇️ 下载代码压缩包
                </button>
            </div>
        </div>
    </div>

    <script>
        const sessionId = 'session_' + Date.now();
        let currentTables = [];
        let selectedTables = {};  // { tableName: { displayName, columns: [...] } }

        function updateConnectionFields() {
            const dbType = document.getElementById('dbType').value;
            const standardFields = document.getElementById('standardDbFields');
            const oracleFields = document.getElementById('oracleFields');

            if (dbType === 'oracle') {
                standardFields.style.display = 'none';
                oracleFields.style.display = 'block';
            } else {
                standardFields.style.display = 'block';
                oracleFields.style.display = 'none';

                // 设置默认端口
                const ports = { mysql: 3306, postgresql: 5432, sqlserver: 1433 };
                document.getElementById('port').value = ports[dbType] || 3306;
            }

            // 更新进度指示器
            updateStepIndicator(0);
        }

        async function testConnection() {
            const dbType = document.getElementById('dbType').value;
            const statusDiv = document.getElementById('connectionStatus');

            try {
                console.log('开始测试连接...', dbType);
                let params;
                if (dbType === 'oracle') {
                    params = {
                        db_type: dbType,
                        host: document.getElementById('oracleHost').value,
                        port: document.getElementById('oraclePort').value,
                        user: document.getElementById('oracleUser').value,
                        password: document.getElementById('oraclePassword').value,
                        service_name: document.getElementById('oracleServiceName').value,
                        session_id: sessionId
                    };
                } else {
                    params = {
                        db_type: dbType,
                        host: document.getElementById('host').value || 'localhost',
                        port: parseInt(document.getElementById('port').value) || 3306,
                        user: document.getElementById('user').value || 'root',
                        password: document.getElementById('password').value || '',
                        database: document.getElementById('database').value || '',
                        session_id: sessionId
                    };
                }

                console.log('连接参数:', params);
                showStatus(statusDiv, '连接中...', 'loading');

                const response = await fetch('/api/test-connection', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params)
                });

                const data = await response.json();
                console.log('服务器响应:', data);

                if (data.success) {
                    showStatus(statusDiv, '✓ 连接成功！', 'success');
                    updateStepIndicator(1);
                    await loadTables();
                } else {
                    showStatus(statusDiv, '✗ ' + data.message, 'error');
                }
            } catch (error) {
                console.error('连接异常:', error);
                showStatus(statusDiv, '✗ ' + error.message, 'error');
            }
        }

        async function loadTables() {
            const loadingDiv = document.getElementById('loadingTables');
            const tablesList = document.getElementById('tablesList');
            const statusDiv = document.getElementById('tablesStatus');

            try {
                loadingDiv.classList.add('show');
                tablesList.style.display = 'none';

                const response = await fetch('/api/get-tables', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId })
                });

                const data = await response.json();

                if (data.success) {
                    currentTables = data.tables;
                    renderTablesList();
                    loadingDiv.classList.remove('show');
                    tablesList.style.display = 'block';
                } else {
                    showStatus(statusDiv, '✗ ' + data.message, 'error');
                }
            } catch (error) {
                showStatus(statusDiv, '✗ ' + error.message, 'error');
            }
        }

        function renderTablesList() {
            const tablesList = document.getElementById('tablesList');
            tablesList.innerHTML = '';

            currentTables.forEach(table => {
                const div = document.createElement('div');
                div.className = 'table-item';
                if (selectedTables[table]) {
                    div.classList.add('selected');
                }
                
                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = !!selectedTables[table];
                checkbox.onchange = (e) => {
                    e.stopPropagation();
                    selectTable(table, checkbox.checked);
                };
                
                const info = document.createElement('div');
                info.className = 'table-info';
                info.innerHTML = `<h4>${table}</h4><p>点击勾选此表</p>`;
                
                div.appendChild(checkbox);
                div.appendChild(info);
                div.onclick = (e) => {
                    if (e.target !== checkbox) {
                        checkbox.checked = !checkbox.checked;
                        selectTable(table, checkbox.checked);
                    }
                };
                
                tablesList.appendChild(div);
            });
        }

        async function selectTable(tableName, isChecked) {
            if (!isChecked) {
                // 取消勾选
                delete selectedTables[tableName];
            } else {
                // 勾选该表
                // 获取表的字段信息
                const response = await fetch('/api/get-table-info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        table_name: tableName
                    })
                });

                const data = await response.json();
                if (data.success) {
                    // 自动选中所有非主键字段
                    const columns = data.columns
                        .filter(col => !col.is_primary_key)
                        .map(col => col.name);

                    selectedTables[tableName] = {
                        displayName: tableName,
                        comment: data.comment,
                        columns: data.columns,
                        selectedColumns: columns
                    };
                }
            }

            // 更新表列表显示
            renderTablesList();
            updateTablesSummary();
            updateStepIndicator(1);
        }

        function updateTablesSummary() {
            const summary = document.getElementById('selectedTablesSummary');
            const tables = Object.keys(selectedTables);

            if (tables.length === 0) {
                summary.textContent = '未选择任何表';
            } else {
                summary.innerHTML = tables.map(table => {
                    const fieldCount = selectedTables[table].selectedColumns.length;
                    return `<div style="margin: 5px 0;">✓ <strong>${table}</strong> (${fieldCount}个字段)</div>`;
                }).join('');
            }
        }

        async function generateCode() {
            const tables = Object.entries(selectedTables).map(([name, config]) => ({
                table_name: name,
                display_name: config.displayName,
                columns: config.selectedColumns
            }));

            if (tables.length === 0) {
                alert('请先选择至少一个表');
                return;
            }

            const statusDiv = document.getElementById('generateStatus');
            const downloadSection = document.getElementById('downloadSection');
            try {
                showStatus(statusDiv, '生成中...', 'loading');
                downloadSection.style.display = 'none';

                const response = await fetch('/api/generate-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: sessionId,
                        tables: tables,
                        output_path: document.getElementById('outputPath').value
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showStatus(statusDiv, `✓ ${data.message}`, 'success');
                    updateStepIndicator(3);
                    
                    // 显示下载按钮
                    document.getElementById('generatedTablesList').textContent = data.generated_files.join(', ');
                    downloadSection.style.display = 'block';
                    
                    // 设置下载按钮
                    const downloadBtn = document.getElementById('downloadBtn');
                    downloadBtn.onclick = () => downloadGeneratedCode(data.download_key, data.filename);
                } else {
                    showStatus(statusDiv, '✗ ' + data.message, 'error');
                    downloadSection.style.display = 'none';
                }
            } catch (error) {
                showStatus(statusDiv, '✗ ' + error.message, 'error');
                downloadSection.style.display = 'none';
            }
        }

        function downloadGeneratedCode(downloadKey, filename) {
            // 下载生成的代码压缩包
            const downloadUrl = `/api/download-code/${downloadKey}`;
            
            // 创建隐藏的链接并自动点击
            const link = document.createElement('a');
            link.href = downloadUrl;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function clearSelection() {
            selectedTables = {};
            document.getElementById('selectedTablesSummary').textContent = '未选择任何表';
            renderTablesList();
            updateStepIndicator(0);
        }

        function showStatus(div, message, type) {
            div.textContent = message;
            div.className = `status show ${type}`;
        }

        function updateStepIndicator(step) {
            for (let i = 1; i <= 3; i++) {
                const stepEl = document.getElementById(`step${i}`);
                if (i < step) {
                    stepEl.className = 'step completed';
                } else if (i === step) {
                    stepEl.className = 'step active';
                } else {
                    stepEl.className = 'step';
                }
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            updateConnectionFields();
        });
    </script>
</body>
</html>
